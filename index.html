<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-family: 'Arial', sans-serif;
            font-size: 60px;
            color: #00ff88;
            animation: float 3s ease-in-out infinite;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88, 0 0 80px #00ff44;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }
    </style>
</head>
<body>
    <h1>Hello World!</h1>
    <script>
        const h1 = document.querySelector('h1');
        const colors = ['#00ff88', '#ff0088', '#0088ff', '#ffaa00', '#aa00ff'];
        let index = 0;

        h1.style.cursor = 'pointer';
        h1.addEventListener('click', () => {
            index = (index + 1) % colors.length;
            h1.style.color = colors[index];
            h1.style.textShadow = `0 0 20px ${colors[index]}, 0 0 40px ${colors[index]}, 0 0 80px ${colors[index]}`;
        });
    </script>
</body>
</body>
</html>
